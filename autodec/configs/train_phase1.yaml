seed: 42
run_name: autodec_phase1
dataset: shapenet
device: cuda
use_wandb: false

wandb:
  project: autodec
  api_key_env: WANDB_API_KEY

visualization:
  enabled: true
  root_dir: data/viz
  every_n_epochs: 1
  num_samples: 2
  split: val
  log_to_wandb: true
  mesh_resolution: 24
  exist_threshold: 0.5
  max_points: 4096

checkpoints:
  encoder_from: checkpoints/shapenet/ckpt.pt
  resume_from: null
  keep_epoch: false
  strict_encoder: true

autodec:
  residual_dim: 64
  primitive_dim: 18
  n_surface_samples: 256
  exist_tau: 1.0
  encoder:
    decoder:
      n_queries: 16
      n_layers: 3
      n_heads: 1
      masked_attention: false
      swapped_attention: false
      dim_feedforward: 512
      deep_supervision: false
      pos_encoding_type: sinusoidal
    point_encoder:
      in_channels: 3
      out_channels: 128
      kernel_size: 3
      resolution: 32
      voxelization:
        normalize: true
        eps: 0
      l1:
        in_channels: 3
        out_channels: 64
        kernel_size: 3
        resolution: 32
        voxelization:
          normalize: true
          eps: 0
      l2:
        in_channels: 64
        out_channels: 128
        kernel_size: 3
        resolution: 16
        voxelization:
          normalize: true
          eps: 0
      l3:
        in_channels: 128
        out_channels: 128
        kernel_size: 3
        resolution: 16
        voxelization:
          normalize: true
          eps: 0
  decoder:
    hidden_dim: 128
    n_heads: 4
    positional_frequencies: 6
    component_feature_dim: null
    n_blocks: 2
    self_attention_mode: within_primitive
    offset_scale: null
    offset_cap: 0.3

shapenet:
  path: data/ShapeNet
  categories: ["03001627"]
  normalize: false
  max_train_items: null
  max_val_items: null
  subset_seed: 42

trainer:
  save_path: checkpoints
  save_every_n_epochs: 50
  evaluate_every_n_epochs: 1
  num_epochs: 200
  batch_size: 4
  num_workers: 4
  augmentations: true
  occlusions: false
  force_occlusions: false
  new_camera_sample: false

optimizer:
  phase: 1
  lr: 1e-4
  decoder_lr: 1e-4
  encoder_lr: 1e-5
  residual_lr: 1e-4
  weight_decay: 0
  betas: [0.9, 0.999]
  enable_scheduler: false

loss:
  type: autodec
  phase: 1
  lambda_sq: 0.0
  lambda_par: 0.0
  lambda_exist: 0.0
  lambda_cons: 0.0
  n_sq_samples: 256
  exist_point_threshold: 24.0
  min_backward_weight: 1e-3
