seed: 42
use_wandb: true
wandb:
  project: superdec
  entity: gtave
run_name: shapenet_geom_ase_004_lowfilter_hq
dataset: ase_object
device: cuda

checkpoints:
  # resume_from: checkpoints/shapenet_geom_022/epoch_1000.pt
  resume_from: checkpoints/shapenet_iou_371/epoch_1000.pt
  keep_epoch: False

superdec:
  extended: true
  extended_non_zero_init: true
  clear_orientation_heads: false
  decoder:
    n_queries: 16
    n_layers: 3 # number of transformer decoders
    n_heads: 1
    masked_attention: false
    swapped_attention: false
    dim_feedforward: 512 # default
    deep_supervision: False
    pos_encoding_type: sinusoidal
  point_encoder:
    in_channels: 3
    out_channels: 128
    kernel_size: 3
    resolution: 32
    voxelization:
      normalize: True
      eps: 0
    l1:
      in_channels: 3
      out_channels: 64
      kernel_size: 3
      resolution: 32
      voxelization:
        normalize: True
        eps: 0
    l2:
      in_channels: 64
      out_channels: 128
      kernel_size: 3
      resolution: 16
      voxelization:
        normalize: True
        eps: 0
    l3:
      in_channels: 128
      out_channels: 128
      kernel_size: 3
      resolution: 16
      voxelization:
        normalize: True
        eps: 0  

ase_object:
  instances_path: /capstor/store/cscs/swissai/a115/data/ase_instances_500
  csv_path: /capstor/store/cscs/swissai/a115/data/ase_wai_train_500/object_info_new.csv
  abo_path: data/ABO/processed-complete
  split: train
  normalize: True
  gt_params_path: data/output_npz/abo/iou_tb/train.npz
  filter:
    metric: iou
    threshold: 0.80


trainer:
  save_path: checkpoints
  save_every_n_epochs: 100
  num_epochs: 1000
  batch_size: 32
  num_workers: 16 # augmentations are slow
  evaluate_every_n_epochs: 10
  augmentations: False
  occlusions: False
optimizer:
  lr: 1e-4 #1e-4 #1e-4   0.001
  weight_decay: 0 # default
  betas: [0.9, 0.999] # default
  enable_scheduler: True # True
  only_heads: False

scheduler:  
  _target_: torch.optim.lr_scheduler.OneCycleLR 
  max_lr: ${optimizer.lr} 
  epochs: ${trainer.num_epochs}
  steps_per_epoch: -1

loss:
  type: geom
  w_geometric: 1.0
  w_geometric_f: 1.0
  w_exist: 0.01
  c_geometric: 1.0
  c_z_align: 0.0
  c_exist: 0.01
  n_samples_cost: 64
  n_samples: 512
  
visualization:
  res_primitives: 40
