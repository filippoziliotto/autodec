checkpoints_folder: checkpoints/shapenet
checkpoint_file: ckpt.pt
output_dir: data/output_npz/shapenet
config_file: config.yaml
device: "cuda"
dataset: shapenet
dataloader:
  split: train
  batch_size: 128
  num_workers: 4
trainer:
  occlusions: True
shapenet:
  path: "data/ShapeNet"
  normalize: true
  categories: null
  use_fps: true
evaluation:
  resolution: 50 