seed: 42
use_wandb: true
wandb:
  project: superdec
  entity: gtave
run_name: shapenet_geom_002
dataset: shapenet
device: cuda

checkpoints:
  resume_from: checkpoints/normalized/ckpt.pt
  keep_epoch: False

superdec:
  extended: true
  extended_non_zero_init: true
  clear_orientation_heads: true
  decoder:
    n_queries: 16
    n_layers: 3 # number of transformer decoders
    n_heads: 1
    masked_attention: false
    swapped_attention: false
    dim_feedforward: 512 # default
    deep_supervision: False
    pos_encoding_type: sinusoidal
  point_encoder:
    in_channels: 3
    out_channels: 128
    kernel_size: 3
    resolution: 32
    voxelization:
      normalize: True
      eps: 0
    l1:
      in_channels: 3
      out_channels: 64
      kernel_size: 3
      resolution: 32
      voxelization:
        normalize: True
        eps: 0
    l2:
      in_channels: 64
      out_channels: 128
      kernel_size: 3
      resolution: 16
      voxelization:
        normalize: True
        eps: 0
    l3:
      in_channels: 128
      out_channels: 128
      kernel_size: 3
      resolution: 16
      voxelization:
        normalize: True
        eps: 0  

shapenet:
  path: data/ShapeNet
  categories: null #['03001627'] 
  normalize: True # NEEDED TO GENERALIZE TO OCCLUSIONS
  gt_train_path: data/output_npz/shapenet/iou_tbr/train.npz
  gt_val_path: data/output_npz/shapenet/iou_tbr/val.npz
  filter:
    metric: iou
    threshold: 0.85

trainer:
  save_path: checkpoints
  save_every_n_epochs: 100
  num_epochs: 1000
  batch_size: 32
  num_workers: 8
  evaluate_every_n_epochs: 10
  augmentations: True
  occlusions: True 
optimizer:
  lr: 4e-4 #1e-4 #1e-4   0.001
  weight_decay: 0 # default
  betas: [0.9, 0.999] # default
  enable_scheduler: True # True
  only_heads: False

scheduler:  
  _target_: torch.optim.lr_scheduler.OneCycleLR 
  max_lr: ${optimizer.lr} 
  epochs: ${trainer.num_epochs}
  steps_per_epoch: -1

loss:
  type: geom
  w_geometric: 10.0
  w_geometric_f: 15.0
  w_exist: 1.0

  c_geometric: 10.0 
  c_exist: 1.0

  n_samples_cost: 64
  n_samples: 256
  
visualization:
  res_primitives: 40
