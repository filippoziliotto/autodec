seed: 0
run_name: gendec_eval
dataset:
  root: gendec/data/ShapeNet
  split: test
model:
  token_dim: 15
  hidden_dim: 256
  n_blocks: 6
  n_heads: 8
  dropout: 0.0
loss:
  lambda_flow: 1.0
  lambda_exist: 0.05
  exist_channel: -1
checkpoints:
  resume_from: gendec/data/checkpoints/phase1_best.pt
eval:
  batch_size: 8
  generated_num_samples: 4
  output_dir: gendec/data/eval
sampling:
  preview_steps: 50
  eval_steps: 100
  exist_threshold: 0.5
visualization:
  enabled: true
  root_dir: data/viz
  generated_num_samples: 10
  mesh_resolution: 24
  exist_threshold: 0.5
  max_preview_points: 4096
autodec_decode:
  enabled: false
  config_path: autodec/configs/eval_test.yaml
  checkpoint_path: checkpoints/autodec_phase2/best.pt
  reference_limit: 32
  point_count: 1024
  f_score_threshold: 0.01
  output_filename: generated_autodec_samples.pt
