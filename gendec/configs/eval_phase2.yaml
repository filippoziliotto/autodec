seed: 0
run_name: gendec_phase2_eval
dataset:
  root: gendec/data/ShapeNetPhase2
  split: test
conditioning:
  enabled: false
  num_classes: null
  class_embed_dim: null
model:
  explicit_dim: 15
  residual_dim: 64
  hidden_dim: 384
  n_blocks: 6
  n_heads: 8
  dropout: 0.0
loss:
  explicit_dim: 15
  lambda_e: 1.0
  lambda_z: 1.0
  lambda_exist: 0.05
  exist_channel: -1
checkpoints:
  resume_from: gendec/data/checkpoints/phase2_best.pt
eval:
  batch_size: 8
  generated_num_samples: 4
  generated_per_class: 5
  output_dir: gendec/data/eval
sampling:
  preview_steps: 50
  eval_steps: 100
  exist_threshold: 0.5
visualization:
  enabled: true
  root_dir: data/viz
  generated_num_samples: 10
  mesh_resolution: 24
  exist_threshold: 0.5
  max_preview_points: 4096
autodec_decode:
  enabled: true
  config_path: checkpoints/autodec_phase2_ddp3_200ep_bs32_from_p1_cons01_ep50_cons01/config.yaml
  checkpoint_path: checkpoints/autodec_phase2_ddp3_200ep_bs32_from_p1_cons01_ep50_cons01/epoch_200.pt
  reference_limit: 32
  point_count: 1024
  f_score_threshold: 0.01
  output_filename: generated_autodec_samples.pt
